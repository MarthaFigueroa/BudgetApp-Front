substitutions:
  _REGION: europe-west1
  _SERVICE: budget-front
  _REPO: budget-app-front

steps:
  # ── 1. Build Docker image ──────────────────────────────────────────────────
  # BUDGET_BACK_URL se lee de Secret Manager y se pasa como build-arg para
  # que Angular compile la URL del backend directamente en el bundle.
  - name: gcr.io/cloud-builders/docker
    id: build
    secretEnv: [BUDGET_BACK_URL]
    entrypoint: bash
    args:
      - -c
      - |
        docker build \
          --build-arg API_URL=$$BUDGET_BACK_URL \
          --tag ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$SHORT_SHA \
          --tag ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest \
          --cache-from ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest \
          .

  # ── 2. Push image to Artifact Registry ────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push
    waitFor: [build]
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}

  # ── 3. Deploy to Cloud Run ─────────────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: deploy
    waitFor: [push]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=80
      - --min-instances=0
      - --max-instances=1

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/BUDGET_BACK_URL/versions/latest
      env: BUDGET_BACK_URL

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8        # Angular build is CPU-intensive
